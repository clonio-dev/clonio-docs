name: Deploy Pergament site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - run: composer install --no-dev --prefer-dist --no-interaction

      - name: Generate static site
        run: |
          vendor/bin/pergament generate-static public \
            --content-path=content \
            --base-url="https://clonio.dev" \
            --clean
        env:
          APP_NAME: Clonio Docs
          APP_URL: https://clonio.dev

      - name: Write CNAME for custom domain
        run: echo "clonio.dev" > public/CNAME

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
